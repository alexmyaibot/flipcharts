<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script>if(localStorage.getItem('fc_auth')!=='ok'){window.location.href='/login.html';}</script>
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>I Lived in Heaven — Primary Flipchart</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; font-family: 'Palatino Linotype', 'Book Antiqua', serif; height: 100vh; width: 100vw; overflow: hidden; }
        .aspect-wrapper { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; background: #000; }
        .screen { position: relative; width: min(100vw, 177.78vh); height: min(100vh, 56.25vw); background: linear-gradient(135deg, #080020, #100040); overflow: hidden; }
        .slideshow { width: 100%; height: 100%; position: relative; }
        .slide { display: none; position: absolute; inset: 0; }
        .slide.active { display: flex; flex-direction: column; }
        .slide-bg { position: absolute; inset: 0; background-size: cover; background-position: center; filter: brightness(0.35); z-index: 0; }
        .slide-content { position: relative; z-index: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; padding: 40px 60px 100px; text-align: center; }
        .slide-section { font-size: 0.8rem; letter-spacing: 3px; text-transform: uppercase; color: rgba(167,139,250,0.7); margin-bottom: 24px; }
        .slide-line { font-size: clamp(1.8rem, 5.5vw, 3.2rem); font-weight: 700; color: #ffffff; line-height: 1.5; text-shadow: 0 3px 30px rgba(0,0,0,0.95), 0 2px 15px rgba(100,60,255,0.5); max-width: 850px; }
        .slide-line.keywords { font-size: clamp(2.4rem, 8vw, 5rem); color: #ffd93d; }
        .title-main { font-size: clamp(2.5rem, 7vw, 5rem); font-weight: bold; color: #ffffff; text-shadow: 0 4px 30px rgba(0,0,0,0.9); margin-bottom: 16px; }
        .title-sub { font-size: clamp(1rem, 2.5vw, 1.4rem); color: rgba(255,255,255,0.65); letter-spacing: 2px; }
        .nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: min(100vw, 177.78vh); z-index: 100; display: flex; align-items: center; justify-content: space-between; padding: 14px 24px; background: rgba(0,0,0,0.5); backdrop-filter: blur(8px); }
        .nav-btn { background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.25); color: white; padding: 10px 32px; border-radius: 30px; font-size: 1.1rem; cursor: pointer; transition: all 0.2s; font-family: Georgia, serif; -webkit-tap-highlight-color: transparent; }
        .nav-btn:active { background: rgba(255,255,255,0.35); transform: scale(0.97); }
        .nav-btn:disabled { opacity: 0.25; cursor: default; }
        .nav-counter { color: rgba(255,255,255,0.6); font-size: 0.9rem; }
        .mode-toggle { position: fixed; top: 14px; right: calc(50% - min(50vw, 88.89vh) + 14px); z-index: 100; display: flex; gap: 8px; }
        .mode-btn { background: rgba(0,0,0,0.55); border: 1px solid rgba(255,255,255,0.3); color: white; padding: 7px 16px; border-radius: 20px; font-size: 0.8rem; cursor: pointer; transition: all 0.2s; }
        .mode-btn.active { background: #a78bfa; color: #000; border-color: #a78bfa; font-weight: 600; }
        .jump-nav { position: fixed; top: 14px; left: calc(50% - min(50vw, 88.89vh) + 14px); z-index: 100; display: flex; gap: 6px; }
        .jump-btn { background: rgba(0,0,0,0.55); border: 1px solid rgba(255,255,255,0.3); color: white; padding: 7px 12px; border-radius: 20px; font-size: 0.75rem; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
        .jump-btn.home-btn { background: rgba(167,139,250,0.3); border-color: #a78bfa; color: #a78bfa; }
        
        

        /* Photo mode */
        #slideshow.photo-mode .slide-line,
        #slideshow.photo-mode .slide-section,
        #slideshow.photo-mode .title-main,
        #slideshow.photo-mode .title-sub { opacity: 0 !important; transition: opacity 0.3s; }
        #slideshow.photo-mode .slide-bg { filter: brightness(0.85) !important; }
        .progress-bar { position: fixed; top: 0; left: 50%; transform: translateX(-50%); height: 4px; background: #ffd93d; transition: width 0.3s ease; z-index: 200; max-width: min(100vw, 177.78vh); }
        @media (max-width: 768px) { .slide-content { padding: 30px 30px 90px; } .slide-line { font-size: clamp(1.5rem, 6.5vw, 2.5rem); } .nav-btn { padding: 10px 24px; font-size: 1rem; } }
    </style>
</head>
<body>
<div class="progress-bar" id="progressBar"></div>
<div class="jump-nav" id="jumpNav"></div>
<div class="mode-toggle"><button class="mode-btn active" id="modeBtn" onclick="cycleMode()" title="Cycle: Lyrics → Keywords → Photo">📝</button></div>
<div class="aspect-wrapper"><div class="screen"><div class="slideshow" id="slideshow">
    <div class="slide active" data-type="title">
        <div class="slide-bg" style="background-image: url('images/title.jpg')"></div>
        <div class="slide-content">
            <div class="title-main">I Lived in Heaven</div>
            <div class="title-sub">Primary</div>
        </div>
    </div>
    <div class="slide" data-section="Verse 1" data-full="I lived in heaven a long time ago, it is true" data-key="I LIVED IN HEAVEN">
        <div class="slide-bg" style="background-image: url('images/v1a.jpg')"></div>
        <div class="slide-content"><div class="slide-section">Verse 1</div><div class="slide-line"></div></div>
    </div>
    <div class="slide" data-section="Verse 1" data-full="Lived there and loved there with people I know. So did you." data-key="SO DID YOU">
        <div class="slide-bg" style="background-image: url('images/v1a.jpg')"></div>
        <div class="slide-content"><div class="slide-section"></div><div class="slide-line"></div></div>
    </div>
    <div class="slide" data-section="Verse 1" data-full="Then Heav'nly Father presented a beautiful plan" data-key="BEAUTIFUL PLAN">
        <div class="slide-bg" style="background-image: url('images/v1b.jpg')"></div>
        <div class="slide-content"><div class="slide-section"></div><div class="slide-line"></div></div>
    </div>
    <div class="slide" data-section="Verse 1" data-full="All about earth and eternal salvation for man" data-key="SALVATION">
        <div class="slide-bg" style="background-image: url('images/v1b.jpg')"></div>
        <div class="slide-content"><div class="slide-section"></div><div class="slide-line"></div></div>
    </div>
    <div class="slide" data-section="Verse 2" data-full="Father said he needed someone who had enough love" data-key="ENOUGH LOVE">
        <div class="slide-bg" style="background-image: url('images/v2a.jpg')"></div>
        <div class="slide-content"><div class="slide-section">Verse 2</div><div class="slide-line"></div></div>
    </div>
    <div class="slide" data-section="Verse 2" data-full="To give his life so we all could return there above" data-key="RETURN ABOVE">
        <div class="slide-bg" style="background-image: url('images/v2a.jpg')"></div>
        <div class="slide-content"><div class="slide-section"></div><div class="slide-line"></div></div>
    </div>
    <div class="slide" data-section="Verse 2" data-full="There was another who sought for the honor divine" data-key="HONOR DIVINE">
        <div class="slide-bg" style="background-image: url('images/v2b.jpg')"></div>
        <div class="slide-content"><div class="slide-section"></div><div class="slide-line"></div></div>
    </div>
    <div class="slide" data-section="Verse 2" data-full="Jesus said, &ldquo;Father, send me, and the glory be thine.&rdquo;" data-key="SEND ME">
        <div class="slide-bg" style="background-image: url('images/v2b.jpg')"></div>
        <div class="slide-content"><div class="slide-section"></div><div class="slide-line"></div></div>
    </div>
    <div class="slide" data-section="Verse 3" data-full="Jesus was chosen, and as the Messiah he came" data-key="MESSIAH">
        <div class="slide-bg" style="background-image: url('images/v3a.jpg')"></div>
        <div class="slide-content"><div class="slide-section">Verse 3</div><div class="slide-line"></div></div>
    </div>
    <div class="slide" data-section="Verse 3" data-full="Conquering evil and death through his glorious name" data-key="CONQUERING DEATH">
        <div class="slide-bg" style="background-image: url('images/v3a.jpg')"></div>
        <div class="slide-content"><div class="slide-section"></div><div class="slide-line"></div></div>
    </div>
    <div class="slide" data-section="Verse 3" data-full="Giving us hope of a wonderful life yet to be" data-key="WONDERFUL LIFE">
        <div class="slide-bg" style="background-image: url('images/v3b.jpg')"></div>
        <div class="slide-content"><div class="slide-section"></div><div class="slide-line"></div></div>
    </div>
    <div class="slide" data-section="Verse 3" data-full="Home in that heaven where Father is waiting for me" data-key="FATHER WAITING">
        <div class="slide-bg" style="background-image: url('images/v3b.jpg')"></div>
        <div class="slide-content"><div class="slide-section"></div><div class="slide-line"></div></div>
    </div>
</div></div></div>
<div class="nav">
    <button class="nav-btn" id="prevBtn" onclick="changeSlide(-1)" disabled>← Back</button>
    <span class="nav-counter" id="counter">1 / 13</span>
    <button class="nav-btn" id="nextBtn" onclick="changeSlide(1)">Next →</button>
</div>
<script>
    let current = 0, mode = 'full';
    const slides = document.querySelectorAll('.slide');
    const total = slides.length;
    
    function updateSlideContent() {
        slides.forEach(slide => {
            const el = slide.querySelector('.slide-line');
            if (!el) return;
            const full = slide.dataset.full;
            const key = slide.dataset.key;
            if (!full) return;

            if (mode === 'full') {
                el.classList.remove('keywords', 'guess-mode');
                el.innerHTML = full;

            } else if (mode === 'guess') {
                // Show FULL lyrics but replace key words with blanks
                el.classList.remove('keywords');
                el.classList.add('guess-mode');
                const keyWords = new Set((key || '').toUpperCase().split(/[\s·]+/).filter(w => w.replace(/[^A-Z]/g,'').length > 2));
                const fullWords = full.split(' ');
                el.innerHTML = fullWords.map(w => {
                    const clean = w.replace(/[^a-zA-Z0-9']/g, '').toUpperCase();
                    const isKey = keyWords.has(clean);
                    if (isKey) {
                        const width = Math.max(clean.length * 16, 40);
                        return '<span style="display:inline-block;border-bottom:3px solid rgba(255,255,255,0.85);min-width:' + width + 'px;margin:0 3px;vertical-align:bottom;height:1.1em;"></span>';
                    }
                    return w;
                }).join(' ');

            } else if (mode === 'keywords') {
                el.classList.add('keywords');
                el.classList.remove('guess-mode');
                el.textContent = key || full;

            } else {
                el.classList.remove('keywords', 'guess-mode');
                el.innerHTML = full;
            }
        });
    }
    function changeSlide(dir) { slides[current].classList.remove('active'); current = Math.max(0, Math.min(total-1, current+dir)); slides[current].classList.add('active'); updateNav(); }
    function changeSlideAbsolute(idx) { slides[current].classList.remove('active'); current = idx; slides[current].classList.add('active'); updateNav(); }
    function updateNav() { document.getElementById('counter').textContent = (current+1)+' / '+total; document.getElementById('prevBtn').disabled = current===0; document.getElementById('nextBtn').disabled = current===total-1; document.getElementById('progressBar').style.width = ((current+1)/total*100)+'%'; }

    // ===== MODE CYCLING =====
    const modeOrder = ['full', 'guess', 'keywords', 'photo'];
    const modeIcons = {'full': '📝', 'guess': '❓', 'keywords': '🔑', 'photo': '📷'};
    function cycleMode() {
        const idx = modeOrder.indexOf(mode);
        mode = modeOrder[(idx + 1) % modeOrder.length];
        const btn = document.getElementById('modeBtn');
        if (btn) { btn.textContent = modeIcons[mode]; btn.classList.toggle('active', true); }
        document.getElementById('slideshow').classList.toggle('photo-mode', mode === 'photo');
        updateSlideContent();
    }
    
    function buildJumpNav() { const nav = document.getElementById('jumpNav'); const btn = document.createElement('button'); btn.className='jump-btn home-btn'; btn.textContent='←'; btn.onclick=()=>changeSlideAbsolute(0); nav.appendChild(btn); const libBtn = document.createElement('button'); libBtn.className='jump-btn'; libBtn.textContent='🎵'; libBtn.onclick=()=>window.location.href='/flipcharts/'; nav.appendChild(libBtn); }
    buildJumpNav();
    let touchStartX = 0;
    document.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, {passive:true});
    document.addEventListener('touchend', e => { const diff = touchStartX - e.changedTouches[0].clientX; if (Math.abs(diff) > 50) changeSlide(diff > 0 ? 1 : -1); });
    document.addEventListener('keydown', e => { if (e.key==='ArrowRight'||e.key===' ') { e.preventDefault(); changeSlide(1); } if (e.key==='ArrowLeft') { e.preventDefault(); changeSlide(-1); } });
    updateSlideContent(); updateNav();
</script>
</body>
</html>
