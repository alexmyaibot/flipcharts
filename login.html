<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Primary Flipcharts</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0a0820, #1a1030);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            padding: 20px;
        }
        .card {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(167,139,250,0.2);
            border-radius: 20px;
            padding: 48px 40px;
            width: 100%;
            max-width: 360px;
            text-align: center;
        }
        .logo { font-size: 2.5rem; margin-bottom: 12px; }
        h1 { font-size: 1.4rem; font-weight: 700; margin-bottom: 6px; }
        p { font-size: 0.9rem; color: rgba(255,255,255,0.4); margin-bottom: 32px; }
        input {
            width: 100%;
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 12px;
            padding: 14px 16px;
            color: #fff;
            font-size: 1rem;
            text-align: center;
            letter-spacing: 4px;
            outline: none;
            margin-bottom: 16px;
        }
        input:focus { border-color: #a78bfa; }
        button {
            width: 100%;
            background: linear-gradient(135deg, #a78bfa, #f8a5c2);
            border: none;
            border-radius: 12px;
            padding: 14px;
            color: #fff;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
        }
        .error { color: #ff6b6b; font-size: 0.85rem; margin-top: 12px; display: none; }
    </style>
</head>
<body>
<div class="card">
    <div class="logo">🎵</div>
    <h1>Primary Flipcharts</h1>
    <p>Enter password to access the song library</p>
    <input type="password" id="pw" placeholder="••••••••" onkeydown="if(event.key==='Enter')unlock()">
    <button onclick="unlock()">Enter</button>
    <div class="error" id="err">Incorrect password</div>
</div>
<script>
    if (localStorage.getItem('fc_auth') === 'ok') {
        window.location.href = '/';
    }
    function unlock() {
        if (btoa(document.getElementById('pw').value) === 'Y2MzZHh5eg==') {
            localStorage.setItem('fc_auth', 'ok');
            window.location.href = '/';
        } else {
            document.getElementById('err').style.display = 'block';
            document.getElementById('pw').value = '';
            document.getElementById('pw').focus();
        }
    }
</script>
</body>
</html>
